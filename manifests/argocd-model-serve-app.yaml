apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: model-serve
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://gitea-service.default.svc.cluster.local:3000/mlops/mlops-gitops.git
    targetRevision: main
    path: apps/model-serve
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=false
