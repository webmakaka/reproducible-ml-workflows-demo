apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-serve
  labels:
    app: model-serving
spec:
  replicas: 2
  selector:
    matchLabels:
      app: model-serving
  template:
    metadata:
      labels:
        app: model-serving
    spec:
      containers:
      - name: model-server
        # Initial image - will be updated by pipeline
        # Using a placeholder that will fail until first pipeline run
        image: registry-service.registry.svc.cluster.local:5000/model-serve:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 5001
          name: http
        env:
        - name: MLFLOW_TRACKING_URI
          value: "http://mlflow-service:5000"
        - name: MLFLOW_S3_ENDPOINT_URL
          value: "http://minio-service:9000"
        - name: AWS_ACCESS_KEY_ID
          value: "minioadmin"
        - name: AWS_SECRET_ACCESS_KEY
          value: "minioadmin"
        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: model-service
  labels:
    app: model-serving
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 5001
    nodePort: 30501
    name: http
  selector:
    app: model-serving
